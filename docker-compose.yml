version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  users-api:
    build:
      context: ../UsersAPI
      dockerfile: UsersAPI/Dockerfile
    container_name: users-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

  catalog-api:
    build:
      context: ../CatalogAPI
      dockerfile: CatalogAPI/Dockerfile
    container_name: catalog-api
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

  payments-api:
    build:
      context: ../PaymentsAPI
      dockerfile: PaymentsAPI/Dockerfile
    container_name: payments-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

  notifications-api:
    build:
      context: ../NotificationsAPI
      dockerfile: NotificationsAPI/Dockerfile
    container_name: notifications-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
